name: Tests

on:
  push:
    branches:
      - main
      - "week2/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wedding_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/wedding_test
      ENVIRONMENT: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          cache: pip
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Install backend dependencies
        working-directory: production/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest-cov

      - name: Initialize test database
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/002_add_indexes.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/003_add_constraints.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/004_create_audit_triggers.sql

      - name: Run backend tests with coverage
        working-directory: production/backend
        run: |
          python -m pytest tests -q --cov=app --cov-report=xml --cov-report=html

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            production/backend/coverage.xml
            production/backend/htmlcov
          if-no-files-found: error

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: production/frontend/package-lock.json
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: production/frontend
        run: npm ci

      - name: Build frontend
        working-directory: production/frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: production/frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend browser tests
        working-directory: production/frontend
        run: npm test -- --reporter=line,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            production/frontend/playwright-report
            production/frontend/test-results
          if-no-files-found: ignore
