name: Tests

on:
  push:
    branches:
      - main
      - "week2/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wedding_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/wedding_test
      ENVIRONMENT: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          cache: pip
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Install backend dependencies
        working-directory: production/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest-cov

      - name: Initialize test database
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/002_add_indexes.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/003_add_constraints.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/004_create_audit_triggers.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/005_create_invites_table.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/006_add_rsvp_fields.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/007_create_tasks_table.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/009_create_communications_and_gallery.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/010_add_wedding_phase.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/011_create_blessings.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/012_add_wedding_theme.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/013_create_song_requests.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/014_add_song_preview_url.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/015_add_gallery_thumb_path.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/016_add_feedback.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/migrations/017_create_notifications.sql

      - name: Seed test data
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f production/database/seeds/008_seed_test_data.sql

      - name: Run backend tests with coverage
        working-directory: production/backend
        run: |
          python -m pytest tests -q --cov=app --cov-report=xml --cov-report=html

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            production/backend/coverage.xml
            production/backend/htmlcov
          if-no-files-found: error

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wedding_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/wedding_test
      ENVIRONMENT: development
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend Docker image
        run: |
          docker build -t wedding-backend:test production/backend

      - name: Start backend service
        run: |
          docker run -d \
            --name wedding-backend \
            --network host \
            -e DATABASE_URL="postgresql://test_user:test_password@127.0.0.1:5432/wedding_test" \
            -e ENVIRONMENT=development \
            -e CORS_ORIGINS_RAW="http://127.0.0.1:3100,http://localhost:3100" \
            -e SESSION_COOKIE_SECURE=false \
            wedding-backend:test

      - name: Wait for backend to be healthy
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:3001/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 2
          done
          echo "Backend failed to start"
          docker logs wedding-backend
          exit 1

      - name: Initialize test database
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/schema.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/002_add_indexes.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/003_add_constraints.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/004_create_audit_triggers.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/005_create_invites_table.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/006_add_rsvp_fields.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/007_create_tasks_table.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/009_create_communications_and_gallery.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/010_add_wedding_phase.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/011_create_blessings.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/012_add_wedding_theme.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/013_create_song_requests.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/014_add_song_preview_url.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/015_add_gallery_thumb_path.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/016_add_feedback.sql
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/migrations/017_create_notifications.sql

      - name: Seed test data
        run: |
          psql "${{ env.DATABASE_URL }}" -v ON_ERROR_STOP=1 -f production/database/seeds/008_seed_test_data.sql

      - name: Smoke test real login (un-mocked, against running backend image)
        run: |
          set -euo pipefail
          # The frontend e2e suite mocks /api/auth, so it never exercises the
          # real login path. Hit the actual running backend with a seeded code
          # to guarantee the real frontend->backend auth contract works.
          code="$(curl --silent --show-error --max-time 10 \
            -o /tmp/login.json -w '%{http_code}' \
            -X POST http://127.0.0.1:3001/api/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"invite_code":"DEMO-COUPLE"}')"
          echo "login HTTP ${code}"; cat /tmp/login.json; echo
          test "${code}" = "200"
          grep -q '"role":"couple"' /tmp/login.json
          # Readiness must report ready against the migrated, seeded DB.
          ready="$(curl --silent --show-error --max-time 10 \
            -o /tmp/ready.json -w '%{http_code}' http://127.0.0.1:3001/health/ready)"
          echo "ready HTTP ${ready}"; cat /tmp/ready.json; echo
          test "${ready}" = "200"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          cache-dependency-path: production/frontend/package-lock.json
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: production/frontend
        run: npm ci

      - name: Build frontend
        working-directory: production/frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: production/frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend browser tests with real backend
        working-directory: production/frontend
        env:
          VITE_API_BASE_URL: http://127.0.0.1:3001
        run: npm run test:e2e -- --reporter=line,html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: |
            production/frontend/playwright-report
            production/frontend/test-results
          if-no-files-found: ignore

      - name: Show backend logs on failure
        if: failure()
        run: docker logs wedding-backend
