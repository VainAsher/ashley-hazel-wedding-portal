name: Test Matrix - Design Migration Validation

on:
  push:
    branches:
      - main
      - feature/design-migration
  pull_request:
    branches:
      - main
      - feature/design-migration

jobs:
  test-matrix:
    name: Test Suite - ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [main, feature/design-migration]
      fail-fast: false

    steps:
      - name: Checkout code (${{ matrix.branch }})
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'production/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: production/frontend
        run: npm ci

      - name: Run type checking
        working-directory: production/frontend
        run: npm run typecheck
        continue-on-error: true

      - name: Run tests
        working-directory: production/frontend
        id: tests
        run: npm test
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.branch }}
          path: test-results/
          retention-days: 30

      - name: Parse test results
        if: always()
        id: parse
        run: |
          # Extract test statistics from test-results
          if [ -f test-results/results.json ]; then
            PASSED=$(jq -r '.stats.expected' test-results/results.json || echo "0")
            FAILED=$(jq -r '.stats.failed' test-results/results.json || echo "0")
          else
            PASSED="0"
            FAILED="0"
          fi
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Save test metrics
        if: always()
        run: |
          mkdir -p test-metrics
          echo "${{ matrix.branch }}" > test-metrics/branch.txt
          echo "${{ steps.parse.outputs.passed }}" > test-metrics/passed.txt
          echo "${{ steps.parse.outputs.failed }}" > test-metrics/failed.txt

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-metrics-${{ matrix.branch }}
          path: test-metrics/
          retention-days: 7

  compare-results:
    name: Compare Test Results
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()

    steps:
      - name: Download all metrics
        uses: actions/download-artifact@v3
        with:
          path: all-metrics

      - name: Compare branches
        id: compare
        run: |
          # Read metrics from main branch
          MAIN_PASSED=$(cat all-metrics/test-metrics-main/passed.txt 2>/dev/null || echo "0")
          MAIN_FAILED=$(cat all-metrics/test-metrics-main/failed.txt 2>/dev/null || echo "0")

          # Read metrics from feature branch (if exists)
          FEATURE_PASSED=$(cat all-metrics/test-metrics-feature/design-migration/passed.txt 2>/dev/null || echo "0")
          FEATURE_FAILED=$(cat all-metrics/test-metrics-feature/design-migration/failed.txt 2>/dev/null || echo "0")

          # Set defaults if not found
          MAIN_PASSED=${MAIN_PASSED:-0}
          MAIN_FAILED=${MAIN_FAILED:-0}
          FEATURE_PASSED=${FEATURE_PASSED:-0}
          FEATURE_FAILED=${FEATURE_FAILED:-0}

          echo "main_passed=$MAIN_PASSED" >> $GITHUB_OUTPUT
          echo "main_failed=$MAIN_FAILED" >> $GITHUB_OUTPUT
          echo "feature_passed=$FEATURE_PASSED" >> $GITHUB_OUTPUT
          echo "feature_failed=$FEATURE_FAILED" >> $GITHUB_OUTPUT

          # Calculate differences
          PASSED_DIFF=$((FEATURE_PASSED - MAIN_PASSED))
          FAILED_DIFF=$((FEATURE_FAILED - MAIN_FAILED))

          echo "passed_diff=$PASSED_DIFF" >> $GITHUB_OUTPUT
          echo "failed_diff=$FAILED_DIFF" >> $GITHUB_OUTPUT

          # Check thresholds
          FAIL_PIPELINE=false

          # Threshold 1: Allow max 5 new failures
          if [ $FAILED_DIFF -gt 5 ]; then
            FAIL_PIPELINE=true
            echo "::warning::Feature branch has $FAILED_DIFF new test failures (threshold: 5)"
          fi

          # Threshold 2: Allow max 10% regression in pass rate
          if [ $MAIN_PASSED -gt 0 ]; then
            REGRESSION_PERCENT=$(echo "scale=2; ($PASSED_DIFF * 100) / $MAIN_PASSED" | bc)
            if (( $(echo "$REGRESSION_PERCENT < -10" | bc -l) )); then
              FAIL_PIPELINE=true
              echo "::warning::Feature branch has $REGRESSION_PERCENT% test pass rate regression (threshold: -10%)"
            fi
          fi

          echo "fail_pipeline=$FAIL_PIPELINE" >> $GITHUB_OUTPUT

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const mainPassed = '${{ steps.compare.outputs.main_passed }}';
            const mainFailed = '${{ steps.compare.outputs.main_failed }}';
            const featurePassed = '${{ steps.compare.outputs.feature_passed }}';
            const featureFailed = '${{ steps.compare.outputs.feature_failed }}';
            const passedDiff = '${{ steps.compare.outputs.passed_diff }}';
            const failedDiff = '${{ steps.compare.outputs.failed_diff }}';

            const mainTotal = parseInt(mainPassed) + parseInt(mainFailed);
            const featureTotal = parseInt(featurePassed) + parseInt(featureFailed);

            const mainPassRate = mainTotal > 0 ? ((parseInt(mainPassed) / mainTotal) * 100).toFixed(1) : 'N/A';
            const featurePassRate = featureTotal > 0 ? ((parseInt(featurePassed) / featureTotal) * 100).toFixed(1) : 'N/A';

            let passedEmoji = '✅';
            let failedEmoji = '✅';

            if (passedDiff < 0) passedEmoji = '⚠️';
            if (parseInt(failedDiff) > 0) failedEmoji = '❌';
            if (parseInt(failedDiff) > 5) failedEmoji = '🔴';

            const comment = `## Test Matrix Results

### Comparison: \`main\` vs \`feature/design-migration\`

| Metric | Main | Feature | Change |
|--------|------|---------|--------|
| **Tests Passed** | ${mainPassed} | ${featurePassed} | ${passedDiff > 0 ? '+' : ''}${passedDiff} ${passedEmoji} |
| **Tests Failed** | ${mainFailed} | ${featureFailed} | ${failedDiff > 0 ? '+' : ''}${failedDiff} ${failedEmoji} |
| **Pass Rate** | ${mainPassRate}% | ${featurePassRate}% | - |
| **Total Tests** | ${mainTotal} | ${featureTotal} | - |

### Thresholds
- ✅ Max 5 new failures: ${parseInt(failedDiff) <= 5 ? '**PASS**' : '**FAIL**'}
- ✅ Max -10% regression: ${mainTotal > 0 && parseInt(passedDiff) >= -Math.floor(mainTotal * 0.1) ? '**PASS**' : '**FAIL**'}

### Details
- [Main branch results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
- Branch: \`${{ github.head_ref }}\`
- Base: \`${{ github.base_ref }}\`

*Updated at: ${new Date().toISOString()}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if thresholds exceeded
        if: steps.compare.outputs.fail_pipeline == 'true'
        run: |
          echo "::error::Test migration thresholds exceeded"
          echo "New failures: ${{ steps.compare.outputs.failed_diff }}/5 allowed"
          echo "Pass regression: ${{ steps.compare.outputs.passed_diff }}"
          exit 1

  summary:
    name: Test Matrix Summary
    runs-on: ubuntu-latest
    needs: [test-matrix, compare-results]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## Test Matrix Workflow Complete"
          echo ""
          echo "**Status**: ${{ needs.compare-results.result }}"
          echo ""
          echo "Branches tested:"
          echo "  - main"
          echo "  - feature/design-migration (if exists)"
          echo ""
          echo "All results have been uploaded as artifacts for review."
          echo "Check the 'Compare Test Results' job for detailed analysis."

      - name: Report to GitHub Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.compare-results.result }}' === 'failure' ? 'failure' : 'success';
            const description = status === 'success'
              ? 'All test thresholds met ✅'
              : 'Test thresholds exceeded ❌';

            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              description: description,
              context: 'test-matrix'
            });
