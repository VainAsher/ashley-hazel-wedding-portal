# ===========================================================================
# Wedding Portal — docker-compose PRODUCTION override
#
# Layer on top of the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (deploy.sh does this automatically when DEPLOY_ENVIRONMENT=production, and
#  also sets COMPOSE_PROJECT_NAME=wedding-prod.)
#
# This override exists so PRODUCTION can run as a fully ISOLATED stack on the
# SAME host as staging without ever sharing data or colliding:
#   - Distinct container names      (wedding-prod-*)   — global per host, must differ.
#   - Distinct named volumes        (wedding-prod-*)   — the base pins FIXED volume
#                                                        names, so prod MUST rename
#                                                        them or it shares staging's data.
#   - Distinct network              (wedding-prod)
#   - Distinct database name        (POSTGRES_DB=wedding_prod, set in the prod env)
#   - Closed db/backend host ports; the frontend publishes a DEDICATED host port
#     (8090) reached cross-VM by Cloudflared + Traefik on infra-core (.23). TLS is
#     terminated at the Cloudflare edge; only the subdomain is reachable publicly.
#   - Tightened runtime (ENVIRONMENT=production, WARNING logs, secure cookies) and
#     restart policy.
#
# Requires Compose v2.24+ for the `!reset` / `!override` merge tags.
# ===========================================================================

services:
  postgresql:
    container_name: wedding-prod-postgresql
    # Never expose the database to the host in production. Reached only by the
    # backend over the wedding-prod network.
    ports: !reset []
    restart: always

  backend:
    container_name: wedding-prod-backend
    environment:
      ENVIRONMENT: production
      # Python logging level name — must be WARNING (config rejects "WARN").
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      DEBUG: "false"
      # Secure cookies require HTTPS, terminated at the Cloudflare edge in prod.
      SESSION_COOKIE_SECURE: "true"
      SENTRY_ENVIRONMENT: production
      # Public URLs baked in so production config validation passes deterministically
      # (it requires https, non-localhost). Same-origin SPA: all three are the
      # public subdomain. DB name comes from POSTGRES_DB=wedding_prod (set by
      # deploy.sh), which the base DATABASE_URL interpolates.
      API_URL: https://ashley-and.hazel-of-halifax.com
      FRONTEND_URL: https://ashley-and.hazel-of-halifax.com
      CORS_ORIGINS_RAW: https://ashley-and.hazel-of-halifax.com
    # No host port: backend is reached only by the frontend over the network.
    ports: !reset []
    restart: always

  frontend:
    container_name: wedding-prod-frontend
    # Cross-VM edge: Cloudflared + Traefik on infra-core (.23) route the public
    # subdomain to this published port on the wedding VM (.32). Defaults to 8090
    # so prod never grabs staging's :80, even if FRONTEND_HOST_PORT is unset.
    # `!override` REPLACES the base port list (rather than appending to it).
    ports: !override
      - "${FRONTEND_HOST_PORT:-8090}:8080"
    restart: always

# Prod-only network — keeps prod containers off staging's `wedding` network.
networks:
  wedding:
    name: wedding-prod

# Prod-only volumes — the base file pins FIXED volume names (wedding-pgdata,
# etc.). Renaming them here is what guarantees production data lands on its OWN
# volumes and a staging deploy can never touch it.
volumes:
  pgdata:
    name: wedding-prod-pgdata
  backend_logs:
    name: wedding-prod-backend-logs
  uploads_data:
    name: wedding-prod-uploads
