# ===========================================================================
# Wedding Portal — Frontend Nginx config (non-root / unprivileged)
#
# Designed for the `nginxinc/nginx-unprivileged` base image, which runs as the
# non-root `nginx` user (uid 101). Therefore:
#   - NO `user` directive (only meaningful when master runs as root).
#   - pid + all temp paths live under /tmp (writable by the non-root user).
#   - listen on 8080 (non-privileged port).
#
# Responsibilities:
#   1. Serve the compiled React (Vite) SPA from /usr/share/nginx/html.
#   2. Reverse-proxy /api/* to backend:3001 over the `wedding` Docker network
#      (Docker DNS service discovery — no hardcoded IPs).
#   3. SPA client-side routing: unknown paths fall back to /index.html so
#      react-router-dom owns routes like /admin, /rsvp, /invite/:code.
#   4. Gzip + long-lived cache headers for hashed static assets.
# ===========================================================================

worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths under /tmp so the non-root user can write them.
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path       /tmp/nginx/proxy_temp;
    fastcgi_temp_path     /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path       /tmp/nginx/uwsgi_temp;
    scgi_temp_path        /tmp/nginx/scgi_temp;

    # ----- Logging -----
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ----- Core tuning -----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ----- Gzip compression -----
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf
        application/font-woff
        application/font-woff2;

    # Map for safe WebSocket upgrade: emits "upgrade" only when the client
    # sent an Upgrade header, otherwise an empty Connection value (so normal
    # HTTP keep-alive is not broken).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # ----- Upstream: backend API service -----
    # `backend` is the docker-compose service name, resolved via Docker's
    # embedded DNS on the `wedding` network. 3001 is its internal port.
    upstream backend {
        server backend:3001;
    }

    server {
        listen       8080;
        listen       [::]:8080;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        client_max_body_size 10m;

        # -------------------------------------------------------------------
        # API reverse proxy.
        #
        # CRITICAL: `proxy_pass http://backend;` references the upstream by NAME
        # with NO trailing URI path, so nginx forwards the ORIGINAL request URI
        # UNCHANGED. `/api/auth/login` -> `http://backend:3001/api/auth/login`,
        # exactly where FastAPI mounts its routers (verified: routers use
        # prefix="/api/auth", "/api/guests", "/api/invites", "/api/tasks").
        #
        # Do NOT write `proxy_pass http://backend/;` (trailing slash) — that
        # would STRIP the `/api` prefix and 404 every backend route.
        # -------------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend;

            # Allow photo uploads (POST /api/gallery) larger than nginx's 1m default.
            client_max_body_size 25m;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Session-cookie auth: frontend uses `credentials: 'include'`.
            # Forward request headers (incl. Cookie) and don't rewrite cookies.
            proxy_pass_request_headers on;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Support upgrade requests (WebSocket) if ever needed.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # -------------------------------------------------------------------
        # Uploaded gallery media — proxied to the backend's StaticFiles mount
        # at /uploads (served from the backend's uploads volume). Same upstream
        # NAME, prefix preserved (no trailing slash) so /uploads/<path> maps to
        # backend:3001/uploads/<path>.
        # -------------------------------------------------------------------
        location /uploads/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # -------------------------------------------------------------------
        # Hashed static assets — cache aggressively (Vite fingerprints names).
        # -------------------------------------------------------------------
        location ~* \.(?:js|css|png|jpe?g|gif|ico|svg|webp|woff2?|ttf|otf|eot|map)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # -------------------------------------------------------------------
        # SPA routing: serve index.html for any unmatched path so React Router
        # owns client-side routes. index.html must NOT be cached so new deploys
        # are picked up immediately.
        # -------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # -------------------------------------------------------------------
        # Lightweight health endpoint for the Docker HEALTHCHECK / orchestrator.
        # -------------------------------------------------------------------
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
    }
}
